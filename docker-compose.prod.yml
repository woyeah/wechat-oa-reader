x-wecom-mcp: &wecom-mcp
  image: ${REGISTRY:-192.168.50.135:5500}/wechat-oa-reader:${IMAGE_TAG:-latest}
  command: ["wecom-mcp"]
  restart: unless-stopped

services:
  # Each instance MUST have its own volume — SQLite does not support
  # concurrent writes. Never mount the same volume to multiple instances.

  # Instance 1 — uses .env.wecom-1
  # Port is read from .env.wecom-1's WECOM_MCP_PORT (default 8000)
  wecom-mcp-1:
    <<: *wecom-mcp
    env_file: .env.wecom-1
    ports:
      - "${WECOM_MCP_PORT:-8000}:${WECOM_MCP_PORT:-8000}"
    volumes:
      - wecom-1-data:/data

  # Instance 2 — uses .env.wecom-2 (uncomment when needed)
  # Create .env.wecom-2 with a different WECOM_MCP_PORT (e.g. 8003)
  # wecom-mcp-2:
  #   <<: *wecom-mcp
  #   env_file: .env.wecom-2
  #   ports:
  #     - "${WECOM_MCP_PORT:-8001}:${WECOM_MCP_PORT:-8001}"
  #   volumes:
  #     - wecom-2-data:/data

volumes:
  wecom-1-data:
  # wecom-2-data:
