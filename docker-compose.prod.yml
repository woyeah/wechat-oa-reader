x-common: &common
  image: ${REGISTRY:-192.168.50.135:5500}/wechat-oa-reader:${IMAGE_TAG:-latest}
  restart: unless-stopped

services:
  # ---------- WeCom MCP ----------
  wecom-mcp:
    <<: *common
    command: ["wecom-mcp"]
    ports:
      - "${WECOM_MCP_PORT:-8000}:${WECOM_MCP_PORT:-8000}"
    volumes:
      - wecom-data:/data
    environment:
      - WECOM_CORP_ID=${WECOM_CORP_ID}
      - WECOM_AGENT_SECRET=${WECOM_AGENT_SECRET}
      - WECOM_AGENT_ID=${WECOM_AGENT_ID}
      - WECOM_CALLBACK_TOKEN=${WECOM_CALLBACK_TOKEN}
      - WECOM_CALLBACK_ENCODING_AES_KEY=${WECOM_CALLBACK_ENCODING_AES_KEY}
      - WECOM_MCP_HOST=0.0.0.0
      - WECOM_MCP_PORT=${WECOM_MCP_PORT:-8000}
      - WECOM_DB_PATH=/data/wecom.db

